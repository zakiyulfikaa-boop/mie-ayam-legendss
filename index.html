<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mie Ayam Legends</title>

<meta name="description" content="Mie Ayam Legends - mie ayam enak, murah dan legendaris. Pesan langsung via WhatsApp.">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#fafafa;
color:#333;
}

header{
background:#111;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
font-size:24px;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
}

.hero{
height:90vh;
background:url("https://images.unsplash.com/photo-1555126634-323283e090fa") center/cover;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:white;
text-align:center;
}

.hero h2{
font-size:50px;
animation:fadeUp 1.5s;
}

.hero p{
margin-top:10px;
animation:fadeUp 2s;
}

.btn{
margin-top:20px;
background:#25D366;
padding:15px 25px;
color:white;
border-radius:8px;
text-decoration:none;
}

.container{
max-width:1100px;
margin:auto;
padding:60px 20px;
}

.section-title{
text-align:center;
margin-bottom:40px;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card h3{
padding:15px;
}

.price{
padding:0 15px 20px;
color:#e63946;
font-weight:bold;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.gallery img{
width:100%;
border-radius:10px;
}

.map iframe{
width:100%;
height:350px;
border:0;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<header>

<h1>Mie Ayam Legends</h1>

<nav>
<a href="#menu">Menu</a>
<a href="#galeri">Galeri</a>
<a href="#lokasi">Lokasi</a>
</nav>

</header>

<section class="hero">

<h2>Mie Ayam Legendaris</h2>
<p>Rasa nikmat yang bikin ketagihan</p>

<a class="btn" href="https://wa.me/62895357418148">
Pesan Sekarang
</a>

</section>

<section class="container" id="menu">

<h2 class="section-title">Menu Favorit</h2>

<div class="menu">

<div class="card">
<img src="https://images.unsplash.com/photo-1555126634-323283e090fa">
<h3>Mie Ayam Original</h3>
<p class="price">Rp10.000</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1604908176997-43103e6a49a4">
<h3>Mie Ayam Bakso</h3>
<p class="price">Rp13.000</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1605478523211-3e2e6cfd7aa0">
<h3>Mie Ayam Ceker</h3>
<p class="price">Rp14.000</p>
</div>

</div>

</section>

<section class="container" id="galeri">

<h2 class="section-title">Galeri Makanan</h2>

<div class="gallery">

<img src="https://images.unsplash.com/photo-1555126634-323283e090fa">
<img src="https://images.unsplash.com/photo-1604908176997-43103e6a49a4">
<img src="https://images.unsplash.com/photo-1605478523211-3e2e6cfd7aa0">

</div>

</section>

<section class="container map" id="lokasi">

<h2 class="section-title">Lokasi Kami</h2>

<iframe src="https://maps.google.com/maps?q=banjarnegara&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>

</section>

<footer>

<p>© 2026 Mie Ayam Legends</p>

</footer>

</body>
</html>
